services:
  - type: web
    name: kishan-kavach
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: WEATHER_API_KEY
        sync: false
      - key: WEATHER_CITY
        value: "Delhi"
