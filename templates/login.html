<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.login }} - Kishan Kavach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-bg-effects">
            <div class="hero-glow glow-1"></div>
            <div class="hero-glow glow-2"></div>
        </div>
        <div class="auth-card glass-card fade-up">
            <div class="auth-header">
                <a href="/" class="auth-logo">
                    <span class="logo-icon">🛡️</span>
                    <span class="logo-text">Kishan <span class="gradient-text">Kavach</span></span>
                </a>
                <div class="lang-switch auth-lang">
                    <a href="{{ url_for('set_language', lang='en') }}" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
                    <a href="{{ url_for('set_language', lang='hi') }}" class="lang-btn {% if lang == 'hi' %}active{% endif %}">हिं</a>
                </div>
                <h2>{{ t.login }}</h2>
                <p>{{ t.login_to_account }}</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="email">📧 {{ t.email }}</label>
                    <input type="email" id="email" name="email" placeholder="{{ t.email }}" required>
                </div>
                <div class="form-group">
                    <label for="password">🔒 {{ t.password }}</label>
                    <input type="password" id="password" name="password" placeholder="{{ t.password }}" required>
                </div>
                <button type="submit" class="btn btn-gradient btn-full">{{ t.login }}</button>
            </form>
            <div class="auth-footer">
                <p>{{ t.no_account }} <a href="{{ url_for('register') }}" class="gradient-text">{{ t.register }}</a></p>
                <a href="/" class="back-link">← {{ t.go_home }}</a>
            </div>
        </div>
    </div>
</body>
</html>
